ai.gemini.thinking-budget=${GEMINI_THINKING_BUDGET:0}
ai.gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:512}
ai.gemini.temperature=${GEMINI_TEMPERATURE:0.4}
ai.gemini.min-request-interval-ms=${GEMINI_MIN_REQUEST_INTERVAL_MS:3000}
ai.gemini.cache-ttl-seconds=${GEMINI_CACHE_TTL_SECONDS:300}
logging.file.name=${LOG_FILE:logs/cinema-app.log}
logging.level.com.example.cinema.service.impl.AiChatServiceImpl=INFO

