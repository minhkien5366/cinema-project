# ==========================================

# CẤU HÌNH SERVER PORT (Rất quan trọng khi lên Render)

# ==========================================

server.port=${PORT:8080}



# ==========================================

# KẾT NỐI DATABASE MYSQL

# ==========================================

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cinema2}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.username=${DB_USERNAME:root}

spring.datasource.password=${DB_PASSWORD:}



# Cấu hình Hibernate

spring.jpa.hibernate.ddl-auto=update


spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true



# ==========================================

# CẤU HÌNH SWAGGER & JACKSON

# ==========================================

springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.operationsSorter=alpha



spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

spring.jackson.time-zone=Asia/Ho_Chi_Minh



# ==========================================

# CẤU HÌNH GMAIL SMTP

